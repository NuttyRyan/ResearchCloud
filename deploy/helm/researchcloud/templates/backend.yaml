apiVersion: apps/v1
kind: Deployment
metadata:
  name: researchcloud-backend
  labels:
    {{- include "researchcloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: researchcloud
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: researchcloud
        app.kubernetes.io/component: backend
    spec:
      {{- include "researchcloud.imagePullSecrets" . | nindent 6 }}
      # Spread replicas across nodes for availability on NKP.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: researchcloud
              app.kubernetes.io/component: backend
      {{- if .Values.postgres.enabled }}
      # Wait for the database to accept connections before the app starts, so the
      # table-creation on startup does not crash-loop while Postgres is initializing.
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z researchcloud-postgres 5432; do echo waiting for postgres; sleep 2; done"
      {{- end }}
      containers:
        - name: backend
          image: "{{ include "researchcloud.image" (dict "image" .Values.backend.image "global" .Values.global) }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: researchcloud-backend-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 6
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: researchcloud-backend
  labels:
    {{- include "researchcloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/name: researchcloud
    app.kubernetes.io/component: backend
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
---
apiVersion: v1
kind: Secret
metadata:
  name: researchcloud-backend-secrets
  labels:
    {{- include "researchcloud.labels" . | nindent 4 }}
type: Opaque
stringData:
  RC_SECRET_KEY: {{ .Values.secrets.RC_SECRET_KEY | quote }}
  RC_ENCRYPTION_KEY: {{ .Values.secrets.RC_ENCRYPTION_KEY | quote }}
  RC_DATABASE_URL: {{ include "researchcloud.databaseUrl" . | quote }}
{{- if .Values.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: researchcloud-backend
  labels:
    {{- include "researchcloud.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: researchcloud
      app.kubernetes.io/component: backend
{{- end }}
