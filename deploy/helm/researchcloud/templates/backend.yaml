apiVersion: apps/v1
kind: Deployment
metadata:
  name: researchcloud-backend
  labels:
    {{- include "researchcloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: researchcloud
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: researchcloud
        app.kubernetes.io/component: backend
    spec:
      # Spread replicas across nodes for availability on NKP.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: researchcloud
              app.kubernetes.io/component: backend
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: researchcloud-backend-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: researchcloud-backend
  labels:
    {{- include "researchcloud.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/name: researchcloud
    app.kubernetes.io/component: backend
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
---
apiVersion: v1
kind: Secret
metadata:
  name: researchcloud-backend-secrets
  labels:
    {{- include "researchcloud.labels" . | nindent 4 }}
type: Opaque
stringData:
  RC_SECRET_KEY: {{ .Values.secrets.RC_SECRET_KEY | quote }}
  RC_ENCRYPTION_KEY: {{ .Values.secrets.RC_ENCRYPTION_KEY | quote }}
{{- if .Values.podDisruptionBudget.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: researchcloud-backend
  labels:
    {{- include "researchcloud.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: researchcloud
      app.kubernetes.io/component: backend
{{- end }}
